# =========================================
# ELEVATE — SITE CONFIGURATION
# =========================================

# -------------------------
# BASIC SITE INFO
# -------------------------

title: The Indispensable
description: Elevate Thinking Through Systems, Not Information


# --------------------------
# THEME (VISUAL STYLE)
# --------------------------
# Available options:

# personal favorite themes:
# adventure → rugged / exploratory (All blue tinges)
# delight   → bold / passionate (Maroon, blue blend)
# berry    → vibrant / energetic (little Maroon, more blue blend)
# oasis    → calm / balanced (minimal maroon, more blue blend)
# summer_sunset → warm / nostalgic (maroon, blue blend)
# ocean_breeze → cool / refreshing (maroon, blue blend)
# emerald  → strategy / consulting (recommended) (Green, blue blend)
# indigo   → tech / AI (default) (Indigo, blue blend)
# feast   → rich / indulgent (black, blue blend)
# violet   → creative / visionary (violet, blue blend)
# pumpkin_spice → cozy / comforting (orange, blue blend) - This is good
# evergreen → growth / nature (green, blue blend) - This is good

# slate    → executive minimal 
# midnight → dark mode (deep thinking)
# amber    → warm / authority
# rose     → bold / expressive
# cyan     → analytical / fresh
# mono     → minimal black/white

elevate_theme: evergreen

typography: executive   # options: executive, compact, spacious

# -------------------------
# URL SETTINGS (CUSTOM DOMAIN)
# -------------------------

# Your custom domain
url: "https://indispensable.getunstuck.in"

# IMPORTANT:
# For custom domain, baseurl MUST be empty
baseurl: ""


# -------------------------
# COLLECTIONS (CONTENT TYPES)
# -------------------------

collections:
  drills:
    output: true
    permalink: /drills/:name/

# -------------------------
# DEFAULTS (AUTO LAYOUT)
# -------------------------

defaults:
  - scope:
      path: ""
      type: "drills"
    values:
      layout: "drill"


# -------------------------
# MARKDOWN SETTINGS
# -------------------------

markdown: kramdown
highlighter: rouge


# -------------------------
# BUILD SETTINGS
# -------------------------

exclude:
  - README.md
  - node_modules


# =========================================
# NOTES
# =========================================
#
# 1. Custom domain is enabled → baseurl must be ""
# 2. Ensure CNAME file exists with:
#    indispensable.getunstuck.in
# 3. DNS must point to GitHub Pages
#
# =========================================
