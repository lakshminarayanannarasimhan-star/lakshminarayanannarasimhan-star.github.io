<!DOCTYPE html>
<html data-theme="slate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} | {{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <div class="theme-switcher">
  <button id="theme-button">🎨</button>

  <div id="theme-menu" class="theme-menu">
    <div data-theme="indigo">Indigo</div>
    <div data-theme="emerald">Emerald</div>
    <div data-theme="slate">Slate</div>
    <div data-theme="midnight">Midnight</div>
    <div data-theme="amber">Amber</div>
    <div data-theme="rose">Rose</div>
    <div data-theme="cyan">Cyan</div>
    <div data-theme="mono">Mono</div>
  </div>
</div>
</head>

<body>

<header class="header">

  <div>
    <div class="logo">{{ site.title }}</div>
    <div class="tagline">AI · Strategy · Systems Thinking</div>
  </div>

  <div class="header-right">
    
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/writing">Writing</a>
      <a href="/drills">Drills</a>
      <a href="/think-tank">Think Tank</a>
    </nav>

    <div class="theme-switcher">
      <button id="theme-button">🎨</button>

      <div id="theme-menu" class="theme-menu">
        <div data-theme="indigo">Indigo</div>
        <div data-theme="emerald">Emerald</div>
        <div data-theme="slate">Slate</div>
        <div data-theme="midnight">Midnight</div>
        <div data-theme="amber">Amber</div>
        <div data-theme="rose">Rose</div>
        <div data-theme="cyan">Cyan</div>
        <div data-theme="mono">Mono</div>
      </div>
    </div>

  </div>

</header>

<main class="container">
  {{ content }}
</main>
<script src="{{ '/assets/js/drill.js' | relative_url }}"></script>
<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
