<!DOCTYPE html>
<html 
  data-theme="{{ site.elevate_theme | default: 'indigo' }}"
  data-typography="{{ site.typography | default: 'executive' }}"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} | {{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">
  <div class="header-inner">

    <!-- BRAND -->
    <div class="brand">
      <div class="logo">{{ site.title }}</div>
      <div class="tagline">
        thinking systems · strategy · first principles · execution
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="header-right">

      <!-- 🔥 HAMBURGER -->
      <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- NAV -->
      <nav class="nav" id="nav">
        <a href="/">Home</a>

        <div class="nav-item">
          <a href="/competencies/" class="has-dropdown">Competencies</a>
          <div class="dropdown">
            <a href="/competencies/ai-mastery-report/">AI Mastery</a>
            <a href="/competencies/elite-think-tank-report/">Elite Think Tank</a>
          </div>
        </div>

        <a href="/drills">Why Drills?</a>
        <a href="/about">About</a>

        <!-- LINKEDIN -->
        <a href="#" class="nav-linkedin-elite" onclick="openLinkedIn(event)"></a>
      </nav>

    </div>

  </div>
</header>

<!-- 🔥 OVERLAY (outside header) -->
<div class="nav-overlay" id="nav-overlay"></div>

<main class="container">
  {{ content }}
</main>

<script src="{{ '/assets/js/drill.js' | relative_url }}"></script>
<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

<footer class="footer">
  <div class="container footer-inner">

    <div class="footer-copy">
      {{ site.title }} · Thinking Systems · Strategy · AI  
      <br>
      © {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.
    </div>

  </div>
</footer>

</body>
</html>
