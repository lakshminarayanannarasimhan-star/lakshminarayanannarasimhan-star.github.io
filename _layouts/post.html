---
layout: default
---

<div class="reading-progress"></div>

<article class="post-container">

  <!-- HEADER -->
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>

    <div class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
    </div>
  </header>

  <!-- CONTENT -->
  <div class="post-content">
    {{ content }}
  </div>

</article>
